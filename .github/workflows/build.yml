name: Build Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0


    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'


    - name: Grant execute permission for gradlew
      run: chmod +x gradlew


    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4


    # 只清 RFG 缓存，避免旧生成文件影响定位
    - name: Clean RFG cache
      run: |
        rm -rf ~/.gradle/caches/retro_futura_gradle


    # 先让 RFG 生成 dependency_at.cfg
    - name: Generate dependency AT
      run: |
        ./gradlew extractDependencyATs --no-daemon


    # 查看生成的 AT 内容
    - name: Debug dependency AT
      run: |
        echo "===== dependency_at.cfg ====="
        cat build/rfg/dependency_at.cfg || true

        echo ""
        echo "===== RegistryNamespaced ====="
        grep -n "RegistryNamespaced" build/rfg/dependency_at.cfg || true


    # 查找到底哪个依赖提供这个 AT
    - name: Find AT source
      run: |
        echo "===== Searching Gradle cache ====="

        grep -R "RegistryNamespaced" ~/.gradle/caches/modules-2/files-2.1/ || true


    - name: Build with Gradle
      run: |
        ./gradlew clean build --refresh-dependencies --no-daemon


    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mod-build
        path: build/libs/*.jar
