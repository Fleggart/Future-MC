Name: Build Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. 设置 Gradle 并在后台自动启用高效的缓存机制
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 2. 标准的构建命令：去掉 clean，去掉 --refresh-dependencies，去掉 --no-daemon
    # 允许 Gradle 复用 Daemon 进程以及上一次 GitHub Actions 缓存的反编译 JAR 包
    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mod-build
        path: build/libs/*.jar
